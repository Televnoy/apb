<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APB Admin | Live</title>
    
    <link rel="manifest" href="admin.manifest.json">
    <meta name="theme-color" content="#ffffff">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F8F9FA; 
            color: #2D2D2D;
            -webkit-font-smoothing: antialiased;
        }
        
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Стиль карточек с первого фото */
        .glass-card {
            background: #FFFFFF;
            border-radius: 24px;
            border: 1px solid #EAEAEA;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        /* Контейнер таблицы на 5 строк */
        .live-window {
            height: 320px; /* Примерно 5 строк + заголовок */
            overflow: auto;
            scrollbar-width: thin;
        }

        /* Кастомный скроллбар */
        .live-window::-webkit-scrollbar { width: 4px; height: 4px; }
        .live-window::-webkit-scrollbar-thumb { background: #DDD; border-radius: 10px; }

        input, textarea { border: none !important; outline: none !important; }
        
        .btn-black {
            background: #000000;
            color: white;
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        .btn-black:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
<body class="p-4 md:p-6 lg:max-w-4xl mx-auto">

    <header class="flex justify-between items-center mb-6 px-2">
        <div>
            <div class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-bold mb-1">Судья / Город</div>
            <div class="text-sm font-semibold">1111 <span class="text-gray-300 mx-1">•</span> МОСКВА</div>
        </div>
        <div class="text-right">
            <div class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-bold mb-1">Дисциплина</div>
            <div class="text-sm font-semibold flex items-center gap-1">ДРЕДЫ <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i></div>
        </div>
    </header>

    <section class="glass-card mb-6 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-50 flex justify-between items-center">
            <h2 class="text-[11px] font-bold uppercase tracking-widest text-gray-400">Live трансляция (5 строк)</h2>
            <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
        </div>
        
        <div class="live-window">
            <table class="w-full text-left border-collapse min-w-[600px]">
                <thead class="sticky top-0 bg-white/90 backdrop-blur-md">
                    <tr class="text-[10px] uppercase tracking-tighter text-gray-400 border-b border-gray-50">
                        <th class="px-6 py-3 font-medium italic">ID</th>
                        <th class="px-6 py-3 font-medium italic">ФИО Судьи</th>
                        <th class="px-6 py-3 font-medium italic">Город</th>
                        <th class="px-6 py-3 font-medium italic text-center">Балл</th>
                        <th class="px-6 py-3 font-medium italic text-right">Место</th>
                    </tr>
                </thead>
                <tbody id="live-table-body" class="divide-y divide-gray-50">
                    </tbody>
            </table>
        </div>
    </section>

    <section class="glass-card p-6 mb-6">
        <div class="flex items-center gap-2 mb-3">
            <i data-lucide="sparkles" class="w-4 h-4 text-orange-400"></i>
            <span class="text-[11px] font-bold uppercase tracking-widest text-gray-400 italic">AI Ассистент</span>
        </div>
        <div id="ai-response" class="text-sm text-gray-400 mb-4 min-h-[40px] leading-relaxed italic">
            Напишите запрос для анализа данных...
        </div>
        <div class="flex flex-col gap-3">
            <textarea id="ai-prompt" 
                class="w-full bg-gray-50 rounded-2xl p-4 text-sm placeholder:text-gray-300 resize-none" 
                rows="2" 
                placeholder="Сделай анализ по Москве..."></textarea>
            <button onclick="askAI()" class="btn-black py-4 w-full flex items-center justify-center gap-2 font-bold text-xs uppercase tracking-[0.1em]">
                <i data-lucide="send" class="w-4 h-4"></i> Анализировать
            </button>
        </div>
    </section>

    <section class="grid grid-cols-3 gap-4">
        <div class="glass-card p-4 text-center">
            <div class="text-[9px] uppercase font-bold text-gray-400 mb-1">Участник</div>
            <div id="res-id" class="text-xl font-semibold mono">--</div>
        </div>
        <div class="glass-card p-4 text-center">
            <div class="text-[9px] uppercase font-bold text-gray-400 mb-1">Ср. балл</div>
            <div id="res-score" class="text-xl font-semibold mono text-blue-600">0.0</div>
        </div>
        <div class="glass-card p-4 text-center border-l-4 border-l-black">
            <div class="text-[9px] uppercase font-bold text-gray-400 mb-1">Место</div>
            <div id="res-rank" class="text-xl font-bold"># --</div>
        </div>
    </section>

    <script>
        lucide.createIcons();

        // PWA Регистрация
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('admin.sw.js').then(() => console.log("Admin PWA Loaded"));
        }

        // Эмуляция данных
        const demoData = [
            {id: "01", judge: "Петров А.", city: "Москва", score: 30, rank: 1},
            {id: "02", judge: "Иванов С.", city: "Пермь", score: 29, rank: 2},
            {id: "05", judge: "Сидоров К.", city: "Москва", score: 28, rank: 3},
            {id: "12", judge: "Усманов Р.", city: "Казань", score: 29, rank: 2},
            {id: "07", judge: "Белых М.", city: "Сочи", score: 25, rank: 5},
            {id: "09", judge: "Громов Д.", city: "Москва", score: 30, rank: 1}
        ];

        function renderTable() {
            const body = document.getElementById('live-table-body');
            body.innerHTML = demoData.map(row => `
                <tr class="hover:bg-gray-50/50 transition-colors">
                    <td class="px-6 py-5 mono font-bold text-gray-400">${row.id}</td>
                    <td class="px-6 py-5 text-sm font-medium">${row.judge}</td>
                    <td class="px-6 py-5 text-sm text-gray-400">${row.city}</td>
                    <td class="px-6 py-5 text-center font-bold text-lg">${row.score}</td>
                    <td class="px-6 py-5 text-right">
                        <span class="bg-black text-white text-[10px] px-2 py-1 rounded-full font-bold">${row.rank} место</span>
                    </td>
                </tr>
            `).join('');

            // Обновляем нижнюю плашку (последний результат)
            const last = demoData[demoData.length - 1];
            document.getElementById('res-id').innerText = last.id;
            document.getElementById('res-score').innerText = last.score.toFixed(1);
            document.getElementById('res-rank').innerText = `# ${last.rank}`;
        }

        async function askAI() {
            const btn = document.querySelector('.btn-black');
            const res = document.getElementById('ai-response');
            res.innerText = "Изучаю базу данных...";
            btn.style.opacity = "0.5";
            
            setTimeout(() => {
                res.innerText = "Анализ: Участник 09 получил высший балл от московских судей. Средний балл по дисциплине стабилен.";
                btn.style.opacity = "1";
            }, 1500);
        }

        // Первичный запуск
        renderTable();
        // Автообновление (имитация)
        setInterval(renderTable, 5000);
    </script>
</body>
</html>
